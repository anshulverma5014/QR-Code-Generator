<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Generator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Space+Mono&display=swap');

  :root {
    --bg: #0a0a0a;
    --card: #111;
    --border: #2a2a2a;
    --accent: #e8ff47;
    --text: #f0f0f0;
    --muted: #555;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    position: relative;
overflow-x: hidden;
  
  }

  h1 {
    font-size: clamp(2rem, 6vw, 4rem);
    font-weight: 800;
    letter-spacing: -0.03em;
    line-height: 1;
    margin-bottom: 0.2em;
  }

  h1 span { color: var(--accent); }
.creator{
  margin-top:0.7rem;
  font-family:'Space Mono', monospace;
  font-size:0.68rem;
  letter-spacing:0.12em;
  text-transform:uppercase;
  color:var(--muted);
  opacity:0.85;
}

.creator span{
  color:var(--accent);
}
  .subtitle {
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    color: var(--muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 2.5rem;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2rem;
    width: 100%;
    max-width: 420px;
  }

  .input-group {
    position: relative;
    margin-bottom: 1rem;
  }

  input[type="text"] {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.85rem 1rem;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 0.85rem;
    outline: none;
    transition: border-color 0.2s;
  }

  input[type="text"]:focus { border-color: var(--accent); }
  input[type="text"]::placeholder { color: var(--muted); }

  .options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.75rem;
    margin-bottom: 1.25rem;
  }

  .option-group label {
    display: block;
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.4rem;
  }

  select, input[type="color"] {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 0.8rem;
    outline: none;
    cursor: pointer;
  }

  select { padding: 0.6rem 0.75rem; }

  input[type="color"] {
    height: 36px;
    padding: 2px 4px;
    cursor: pointer;
  }

  button {
    width: 100%;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 8px;
    padding: 0.9rem;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.9rem;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    cursor: pointer;
    transition: transform 0.15s, opacity 0.15s;
  }

  button:hover { opacity: 0.88; transform: translateY(-1px); }
  button:active { transform: translateY(0); }

  .qr-output {
    margin-top: 1.5rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1rem;
    opacity: 0;
    transform: translateY(10px);
    transition: opacity 0.3s, transform 0.3s;
  }

  .qr-output.visible { opacity: 1; transform: translateY(0); }

  #qrcode {
    background: white;
    padding: 12px;
    border-radius: 8px;
    display: inline-block;
  }

  #qrcode canvas, #qrcode img { display: block; }

  .download-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
    padding: 0.6rem 1.5rem;
    width: auto;
    font-size: 0.75rem;
  }

.bg-animation{
  position: fixed;
  inset: 0;
  z-index: -1;
  background:
    linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    
  background-size: 40px 40px;
  animation: moveGrid 10s linear infinite;
  mask-image: radial-gradient(circle at center, black 40%, transparent 100%);
}

.bg-animation::before{
  content:'';
  position:absolute;
  inset:0;
  background: radial-gradient(circle, rgba(232,255,71,0.12), transparent 60%);
  filter: blur(80px);
  animation: pulseGlow 6s ease-in-out infinite alternate;
}

@keyframes moveGrid{
  from{
    transform: translateY(0);
  }
  to{
    transform: translateY(40px);
  }
}

@keyframes pulseGlow{
  0%{
    transform: scale(1);
    opacity:0.4;
  }
  100%{
    transform: scale(1.3);
    opacity:0.9;
  }
}

  .download-btn:hover { border-color: var(--accent); color: var(--accent); opacity: 1; }

  .tag {
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    margin-top: 2rem;
    letter-spacing: 0.1em;
  }
</style>
</head>
<body>
<div class="bg-animation"></div>
<h1>QR<span>.</span></h1>
<p class="subtitle">create scannable codes in seconds</p>

<div class="card">
  <div class="input-group">
    <input type="text" id="qrInput" placeholder="https://example.com or any text…" value="https://anshulverma5014.github.io/Anshul-Verma/">
  </div>

  <div class="options">
    <div class="option-group">
      <label>Size</label>
      <select id="qrSize">
        <option value="128">Small (128)</option>
        <option value="200" selected>Medium (200)</option>
        <option value="256">Large (256)</option>
        <option value="320">XL (320)</option>
      </select>
    </div>
    <div class="option-group">
      <label>Error Level</label>
      <select id="qrError">
        <option value="L">Low (L)</option>
        <option value="M" selected>Medium (M)</option>
        <option value="Q">High (Q)</option>
        <option value="H">Max (H)</option>
      </select>
    </div>
    <div class="option-group">
      <label>Dark Color</label>
      <input type="color" id="darkColor" value="#000000">
    </div>
    <div class="option-group">
      <label>Light Color</label>
      <input type="color" id="lightColor" value="#ffffff">
    </div>
  </div>

  <button onclick="generateQR()">Generate QR Code</button>

  <div class="qr-output" id="qrOutput">
    <div id="qrcode"></div>
    <button class="download-btn" onclick="downloadQR()">↓ Download PNG</button>
  </div>
</div>

<h1>QR<span>.</span></h1>
<p class="subtitle">create scannable codes in seconds</p>

<p class="creator">made by Anshul Raj Verma</p>

<script>
  let qrInstance = null;

  function generateQR() {
    const text = document.getElementById('qrInput').value.trim();
    if (!text) { alert('Please enter some text or URL.'); return; }

    const size = parseInt(document.getElementById('qrSize').value);
    const errorLevel = document.getElementById('qrError').value;
    const dark = document.getElementById('darkColor').value;
    const light = document.getElementById('lightColor').value;

    const container = document.getElementById('qrcode');
    container.innerHTML = '';

    qrInstance = new QRCode(container, {
      text,
      width: size,
      height: size,
      colorDark: dark,
      colorLight: light,
      correctLevel: QRCode.CorrectLevel[errorLevel]
    });

    const out = document.getElementById('qrOutput');
    out.classList.add('visible');
  }

  function downloadQR() {
    const canvas = document.querySelector('#qrcode canvas');
    const img = document.querySelector('#qrcode img');
    let src;
    if (canvas) {
      src = canvas.toDataURL('image/png');
    } else if (img) {
      src = img.src;
    } else {
      alert('Generate a QR code first.'); return;
    }
    const a = document.createElement('a');
    a.href = src;
    a.download = 'qrcode.png';
    a.click();
  }

  // Generate on Enter
  document.getElementById('qrInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') generateQR();
  });

  // Auto-generate on load
  window.onload = generateQR;
</script>
</body>
</html>
